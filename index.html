<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="main">
    <div class="header">
      <div class="headerIcon">
        <i data-lucide="timer"></i>
      </div>
      <h1 class="headerTitle">Contador GENERATION</h1>
      <p class="headerSubtitle">Simple, bonito y efectivo</p>
    </div>

    <div class="body">
      <i data-lucide="sparkles" class="icon"></i>
      <p class="counter" id="counter">0</p>
      <i data-lucide="sparkles" class="icon"></i>
    </div>

    <div class="footer">
      <button class="buttonActions butttonDecrease" id="butttonDecrease">
        <i data-lucide="minus" class="icon"></i>
        Decrementar
      </button>
      <button class="buttonActions buttonReset" id="buttonReset">
        <i data-lucide="rotate-ccw" class="icon"></i>
        Inicializar
      </button>
      <button class="buttonActions butttonIncrease" id="butttonIncrease">
        <i data-lucide="plus" class="icon"></i>
        Incrementar
      </button>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="./index.js"></script>
</body>

</html>
